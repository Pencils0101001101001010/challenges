<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Checkout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Italiana&display=swap"
      rel="stylesheet"
    />

  <body>
    <div class="page-bg">
      <div class="contaner">
        <div class="row card-bg p-2">
          <h1 class="text-center left-side-card">Checkout</h1>

          <div class="p-2">
            <form class="">
              <div class="">
                <label for="inputEmail4" class="col-12">Name on card:</label>
                <input
                  type="text"
                  class="inputs p-3 col-12"
                  id="nameOnCard"
                  placeholder="Name"
                />
              </div>
              <div class="">
                <label for="inputPassword4" class="col-12">Card Number</label>
                <input
                  type="text"
                  class="inputs p-3 col-12"
                  id="inputAddress"
                  placeholder="---- ---- ---- ----"
                />
              </div>
              <div class="col-12">
                <label for="inputAddress" class="col-12">Expiring date</label>
                <input
                  type="text"
                  class="inputs p-3 col-12"
                  id="expireDate"
                  placeholder="--/--"
                />
              </div>
              <div class="col-12">
                <label for="inputAddress2" class="col-12">CVC Code</label>
                <input
                  type="text"
                  class="inputs p-3 col-12"
                  id="cvcCode"
                  placeholder="---"
                />
              </div>

              <div class="col-12 pt-2 text-end">Total: R750.00</div>
              <div class="text-center pt-4">
                <button class="col-3 text-center btn btn-outline-dark">

                    />

                </button>
                <button class="col-3 text-center btn btn-outline-dark">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-apple"
                    viewBox="0 0 16 16"
                  >

                    />

                </button>
                <button class="col-3 text-center btn btn-outline-dark">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-credit-card-2-front"
                    viewBox="0 0 16 16"
                  >

              </div>

              <div class="col-12 pt-2">
                <button type="submit" class="buttons col-12">Checkout</button>
              </div>
            </form>
          </div>

          <!-- <div class="col-6 right-side-card"></div> -->
        </div>
      </div>
    </div>
  </body>
</html>
